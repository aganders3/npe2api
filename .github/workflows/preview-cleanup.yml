name: Preview Cleanup

on:
  pull_request:
    types: [closed, unlabeled]
    branches:
      - main
  workflow_dispatch:
    inputs:
      preview_name:
        description: 'Preview name to cleanup (e.g., pr-123, test-feature)'
        required: true
        type: string

concurrency:
  group: deploy-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || inputs.preview_name }}
  cancel-in-progress: true

jobs:
  cleanup:
    name: Cleanup Preview Deployment
    runs-on: ubuntu-latest
    # Cleanup when PR is closed with 'preview' label, or when 'preview' label is removed
    if: |
      (github.event_name == 'pull_request' && github.event.action == 'closed' && contains(github.event.pull_request.labels.*.name, 'preview')) ||
      (github.event_name == 'pull_request' && github.event.action == 'unlabeled' && github.event.label.name == 'preview')
    permissions:
      deployments: 'write'

    steps:
      - name: Validate preview environment
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            PREVIEW_NAME="pr-${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            PREVIEW_NAME="${{ inputs.preview_name }}"
          else
            echo "ERROR: Cleanup workflow should only run for pull_request or workflow_dispatch events!"
            echo "Event: ${{ github.event_name }}"
            exit 1
          fi

          # Safety check: don't allow cleaning up production
          if [ "$PREVIEW_NAME" == "npe2api" ] || [ -z "$PREVIEW_NAME" ]; then
            echo "ERROR: Cannot clean up production deployment!"
            echo "Preview name: $PREVIEW_NAME"
            exit 1
          fi

          echo "✓ Validated: cleaning up preview '$PREVIEW_NAME'"
          echo "PREVIEW_NAME=$PREVIEW_NAME" >> $GITHUB_ENV

      - uses: actions/checkout@v6

      # pywrangler requires uv
      - name: Install uv
        uses: astral-sh/setup-uv@v7

      # pipeline: core dependencies, dev: workers-py (provides pywrangler)
      - name: Install dependencies
        run: |
          pip install -e .[pipeline,dev]

      - name: Cleanup preview resources
        run: |
          python -m npe2api.preview_cleanup $PREVIEW_NAME
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Mark deployments as inactive
        run: |
          ENVIRONMENT="preview/$PREVIEW_NAME"

          # Get all deployments for this environment
          DEPLOYMENTS=$(gh api "/repos/${{ github.repository }}/deployments?environment=$ENVIRONMENT&per_page=100" --jq '.[].id')

          # Mark each deployment as inactive
          for deployment_id in $DEPLOYMENTS; do
            echo "Marking deployment $deployment_id as inactive"
            gh api --method POST \
              "/repos/${{ github.repository }}/deployments/$deployment_id/statuses" \
              -f state='inactive' \
              -f description='Preview environment cleaned up' || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
